<!DOCTYPE html>
<html lang="zh-CN" data-theme="volc">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - AI 学习助手</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="login-page">

  <!-- 主题切换入口（右上角） -->
  <div class="login-theme-switcher">
    <button class="theme-btn active" data-theme="volc" title="Volcengine 主题" aria-label="切换到 Volcengine 主题"></button>
    <button class="theme-btn" data-theme="nerv" title="Nerv 主题" aria-label="切换到 Nerv 主题"></button>
    <button class="theme-btn" data-theme="golden" title="GoldenTime 主题" aria-label="切换到 GoldenTime 主题"></button>
  </div>

  <!-- 登录卡片 -->
  <main class="card login-card">

    <!-- 顶部 Logo + 标题 + 副标题 -->
    <div class="login-header">
      <div class="login-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <h1>AI 学习助手</h1>
      <p>登录到你的学习空间</p>
    </div>

    <!-- 登录表单 -->
    <form class="login-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="login-account">用户名 / 邮箱</label>
        <input id="login-account" type="text" class="input" placeholder="请输入用户名或邮箱" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">密码</label>
        <input id="login-password" type="password" class="input" placeholder="请输入密码" autocomplete="current-password">
      </div>

      <!-- 记住我 + 忘记密码 -->
      <div class="login-checkbox-row">
        <label class="login-checkbox">
          <input type="checkbox" checked>
          <span class="login-checkbox-mark"></span>
          <span>记住我</span>
        </label>
        <a href="#" class="login-forgot-link">忘记密码？</a>
      </div>

      <button type="submit" class="btn btn-primary login-btn-submit">登录</button>
    </form>

    <!-- 分隔线 -->
    <div class="login-divider">
      <span>或</span>
    </div>

    <!-- 第三方登录 -->
    <div class="login-social">
      <button type="button" class="btn btn-secondary">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        使用 GitHub 登录
      </button>
      <button type="button" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12.11 10.98v2.16h5.32c-.21 1.4-1.62 4.1-5.32 4.1-3.2 0-5.81-2.65-5.81-5.92s2.61-5.92 5.81-5.92c1.82 0 3.04.78 3.74 1.44l2.55-2.46C16.58 3.04 14.6 2.1 12.11 2.1 7.06 2.1 2.98 6.18 2.98 11.23S7.06 20.35 12.11 20.35c5.27 0 8.76-3.7 8.76-8.92 0-.6-.07-1.06-.16-1.51l-8.6.06z"/>
        </svg>
        使用 Google 登录
      </button>
    </div>

    <!-- 底部注册链接 -->
    <p class="login-footer-text">
      还没有账号？<a href="#" class="login-register-link">立即注册</a>
    </p>

  </main>

  <script src="js/theme-switcher.js"></script>
  <script src="js/interactions.js"></script>
</body>
</html>
